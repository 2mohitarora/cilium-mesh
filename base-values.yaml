# Max packet size on the wire
mtu: 1450

# Replace kube-proxy with Cilium's kube-proxy replacement. Cilium takes over all Service load balancing (ClusterIP, NodePort, LoadBalancer) using eBPF programs directly in the kernel — no iptables rules needed.
kubeProxyReplacement: true

# Tells Cilium to encapsulate pod-to-pod traffic between nodes rather than using native/direct routing. Without tunnel mode, Cilium needs the underlying network to know how to route pod CIDR traffic between nodes.
# With tunnel mode, Cilium doesn't need anything. It wraps pod traffic in VXLAN (or Geneve) packets between nodes, using the node IPs as the outer source/destination. Since nodes can already reach each other on their node network, the pod traffic just rides inside that. The underlying network never sees pod IPs at all.
routingMode: tunnel

# Specifies the encapsulation protocol to use for pod-to-pod traffic. VXLAN is a lightweight tunneling protocol that is used to encapsulate network traffic between pods (the alternative is Geneve). VXLAN wraps each packet in an extra UDP+VXLAN header, which adds ~50 bytes of overhead — that's why mtu: 1450 is set to 1500 (standard Ethernet) minus 50.
tunnelProtocol: vxlan

# Cilium operator manages a pool of CIDRs and carves out a per-node block automatically. This is the simplest mode — no cloud provider integration needed. Each node gets its own slice of the pod CIDR to hand out IPs from.
ipam:
  mode: cluster-pool

# Enable Gateway API Support
gatewayAPI:
  enabled: true
envoy:
  enabled: true
  role: daemonset

# In standard Cilium, each pod gets a CiliumEndpoint (CEP) — a 1:1 mapping. In large clusters (thousands of pods), this creates a huge number of individual objects that other Cilium agents and consumers have to watch and sync, which becomes a bottleneck.

# CiliumEndpointSlice (CES) solves this by batching multiple CiliumEndpoints into a single object, similar to how Kubernetes' own EndpointSlice batches Endpoints. So instead of 1,000 individual CEP objects, you might have ~10 CES objects each containing ~100 endpoints.

# Key things it carries for each endpoint inside the slice: the endpoint's identity (security identity assigned by Cilium), its IP addresses, networking state, and the node it's running on. The Cilium operator is responsible for grouping endpoints into slices and keeping them updated.

# CiliumEndpoint (CEP) — created by the Cilium agent on each node. The agent watches pods scheduled on its node, assigns them networking (IP, identity), and writes a CEP object to the Kubernetes API server. So agent → API server → etcd.

# CiliumEndpointSlice (CES) — created by the Cilium operator, not the agent. The operator watches all the individual CEP objects across the cluster, batches them into CES objects, and writes those back to the API server.

# Agents (and other consumers like KVStoreMesh) can now watch the smaller set of CES objects instead of thousands of individual CEPs
ciliumEndpointSlice:
  enabled: true

# Cilium's identity-relevant labels configuration. It controls which Kubernetes pod labels Cilium uses to compute security identities. By default, Cilium uses all pod labels to determine a pod's identity. This setting narrows it down to only few. If you have labels that change frequently or aren't relevant to network policy (like pod-template-hash, controller-revision-hash, etc.), they cause unnecessary identity churn — meaning Cilium constantly creates new identities, regenerates policy, and updates eBPF maps.
labels: "k8s:app;k8s:role;k8s:team;k8s:env;k8s:io.kubernetes.pod.namespace;k8s:app.kubernetes.io/name;k8s:app.kubernetes.io/component;k8s:app.kubernetes.io/part-of"
